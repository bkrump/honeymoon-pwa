name: CI

on:
  pull_request:
  push:
    branches:
      - '**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate trip content
        run: pnpm trip:validate
        env:
          TRIP_SOURCE_BASE64: ${{ secrets.TRIP_SOURCE_BASE64 }}
          TRIP_PASSPHRASE: ${{ secrets.TRIP_PASSPHRASE }}
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
        env:
          TRIP_SOURCE_BASE64: ${{ secrets.TRIP_SOURCE_BASE64 }}
          TRIP_PASSPHRASE: ${{ secrets.TRIP_PASSPHRASE }}
