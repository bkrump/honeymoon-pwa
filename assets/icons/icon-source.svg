<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6fa3"/>
      <stop offset="50%" stop-color="#1f89c7"/>
      <stop offset="100%" stop-color="#42aee6"/>
    </linearGradient>
    <linearGradient id="heart-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7eb3"/>
      <stop offset="100%" stop-color="#e04472"/>
    </linearGradient>
    <linearGradient id="plane-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.25" flood-color="#0a3a5c"/>
    </filter>
  </defs>

  <!-- Background with rounded corners for maskable -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle wave decoration at bottom -->
  <path d="M0 380 Q128 350 256 370 Q384 390 512 360 L512 512 L0 512 Z" fill="#145f8f" opacity="0.35"/>
  <path d="M0 410 Q128 385 256 400 Q384 420 512 395 L512 512 L0 512 Z" fill="#0f4f7d" opacity="0.3"/>

  <!-- Heart -->
  <g filter="url(#shadow)" transform="translate(256, 268)">
    <path d="M0-48 C0-48 -12-88 -52-88 C-92-88 -92-48 -92-48 C-92-16 -52 24 0 72 C52 24 92-16 92-48 C92-48 92-88 52-88 C12-88 0-48 0-48 Z"
          fill="url(#heart-fill)" transform="scale(1.55)"/>
  </g>

  <!-- Small plane silhouette flying above the heart -->
  <g transform="translate(310, 148) rotate(25)" filter="url(#shadow)">
    <path d="M0 0 L-12 -5 L-32 -18 L-12 -8 L-18 -22 L-8 -10 L8 -16 L2 -6 L28 -12 L4 -2 L12 4 L-4 2 Z"
          fill="url(#plane-fill)" transform="scale(2.2)"/>
  </g>

  <!-- Dotted flight path arc -->
  <path d="M150 210 Q200 130 310 148" fill="none" stroke="white" stroke-width="2.5" stroke-dasharray="6 8" opacity="0.55"/>
</svg>
